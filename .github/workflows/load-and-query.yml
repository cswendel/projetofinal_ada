name: Load Data & Run Analytical Queries

on:
  workflow_run:
    workflows: ["MovieFlix Data Extraction"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  load-and-query:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: movieflix
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # ✅ BAIXAR O ARTEFATO GERADO NO OUTRO WORKFLOW
      - name: Baixar CSVs do artefato (do workflow de extração)
        uses: actions/download-artifact@v4
        with:
          name: movieflix-data
          path: extract
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ✅ Debug: conferir que os arquivos vieram do artifact
      - name: Debug - listar e mostrar começo dos CSVs
        run: |
          echo "==== ls extract ===="
          ls -lah extract
          echo "==== head movies.csv ===="
          head -n 5 extract/movies.csv
          echo "==== head users.csv ===="
          head -n 5 extract/users.csv
          echo "==== head ratings.csv ===="
          head -n 5 extract/ratings.csv
          echo "==== sha256 ===="
          sha256sum extract/movies.csv extract/users.csv extract/ratings.csv

      - name: Criar tabelas no Postgres
        env:
          PGPASSWORD: admin123
        run: |
          psql -h localhost -U admin -d movieflix -f db/init.sql

      - name: Carregar CSVs nas tabelas
        env:
          PGPASSWORD: admin123
        run: |
          psql -h localhost -U admin -d movieflix \
            -c "\COPY movies(movie_id,title,year,genre,director) FROM 'extract/movies.csv' DELIMITER ',' CSV HEADER;"
          psql -h localhost -U admin -d movieflix \
            -c "\COPY users(user_id,name,email) FROM 'extract/users.csv' DELIMITER ',' CSV HEADER;"
          psql -h localhost -U admin -d movieflix \
            -c "\COPY ratings(user_id,movie_id,rating,timestamp) FROM 'extract/ratings.csv' DELIMITER ',' CSV HEADER;"

      - name: Executar queries analíticas
        env:
          PGPASSWORD: admin123
        run: |
          echo "===== CONSULTAS QUERIES ====="
          psql -h localhost -U admin -d movieflix -f db/queries.sql

      - name: Verificar contagem das tabelas
        env:
          PGPASSWORD: admin123
        run: |
          psql -h localhost -U admin -d movieflix \
            -c "SELECT 'movies' AS tabela, COUNT(*) FROM movies
                UNION ALL
                SELECT 'users', COUNT(*) FROM users
                UNION ALL
                SELECT 'ratings', COUNT(*) FROM ratings;"
