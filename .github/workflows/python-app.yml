name: MovieFlix Data Extraction

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r extract/requirements.txt

      - name: Executar Script de Extração
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
        run: python extract/extract-pipeline.py

      - name: Salvar CSVs como Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: movieflix-data
          path: |
            extract/movies.csv
            extract/users.csv
            extract/ratings.csv
