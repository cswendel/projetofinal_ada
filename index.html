<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Catálogo de Filmes</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #6366f1;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #334155;
      --star: #fbbf24;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    /* Abas */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab-button {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .tab-button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Conteúdo */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Cards */
    .card {
      background: var(--card);
      padding: 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
      gap: 6px;
    }

    label {
      font-weight: 600;
    }

    input, textarea {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 10px;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
    }

    button.primary {
      background: var(--primary);
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }

    /* Filmes */
    .movie-card {
      background: var(--card);
      padding: 20px;
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .movie-title {
      font-size: 18px;
      font-weight: 700;
    }

    .movie-description {
      color: var(--muted);
      margin: 10px 0 15px;
    }

    /* Estrelas */
    .stars {
      display: flex;
      gap: 6px;
      cursor: pointer;
    }

    .star {
      font-size: 24px;
      color: #475569;
      transition: color 0.2s;
    }

    .star.active {
      color: var(--star);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Catálogo de Filmes</h1>

  <div class="tabs">
    <button class="tab-button active" onclick="openTab('cadastro', this)">
      Cadastrar
    </button>
    <button class="tab-button" onclick="openTab('filmes', this)">
      Filmes
    </button>
  </div>

  <!-- Aba Cadastro -->
  <div id="cadastro" class="tab-content active">
    <div class="card">
      <div class="form-group">
        <label>Título do filme</label>
        <input type="text" placeholder="Ex: Interstellar">
      </div>

      <div class="form-group">
        <label>Descrição</label>
        <textarea rows="4" placeholder="Breve sinopse do filme"></textarea>
      </div>

      <button class="primary">Salvar (exemplo)</button>
    </div>
  </div>

  <!-- Aba Filmes -->
  <div id="filmes" class="tab-content">
    <div class="movie-card">
      <div class="movie-title">Interstellar</div>
      <div class="movie-description">
        Uma equipe de exploradores atravessa um buraco de minhoca para salvar a humanidade.
      </div>

      <div class="stars">
        <span class="star" onclick="rate(this, 1)">★</span>
        <span class="star" onclick="rate(this, 2)">★</span>
        <span class="star" onclick="rate(this, 3)">★</span>
        <span class="star" onclick="rate(this, 4)">★</span>
        <span class="star" onclick="rate(this, 5)">★</span>
      </div>
    </div>
  </div>
</div>

<script>
  function openTab(tabId, button) {
    document.querySelectorAll('.tab-content')
      .forEach(tab => tab.classList.remove('active'));

    document.querySelectorAll('.tab-button')
      .forEach(btn => btn.classList.remove('active'));

    document.getElementById(tabId).classList.add('active');
    button.classList.add('active');
  }

  function rate(starElement, value) {
    const stars = starElement.parentElement.querySelectorAll('.star');
    stars.forEach((star, index) => {
      star.classList.toggle('active', index < value);
    });
  }
</script>

</body>
</html>
